input {
    kb_layout = us
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35

    focus_on_close = 1
	accel_profile = adaptive
	sensitivity = 1
    touchpad {
        natural_scroll = true
        scroll_factor = 1.3
        disable_while_typing = $touchpadDisableTyping
        scroll_factor = $touchpadScrollFactor
    }
}

device {
    name = ven_04f3:00-04f3:32eb-touchpad
    accel_profile = custom
    scroll_points = 0.0 0.02 0.1 0.2 4.0 10.0 15.0 25.0
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
}

